<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百變狼王抽籤系統</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e;
        color: #eaeaea;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background-color: #16213e;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        text-align: center;
        max-width: 450px;
        width: 90%;
        border: 1px solid #0f3460;
    }
    h1 {
        font-size: 26px;
        margin-bottom: 25px;
        color: #e94560;
        letter-spacing: 2px;
    }
    .controls {
        margin-bottom: 25px;
        background-color: #0f3460;
        padding: 15px 20px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    label {
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: #fff;
        transition: color 0.2s;
    }
    label:hover {
        color: #f1c40f;
    }
    input[type="radio"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #e94560;
    }
    button {
        background-color: #e94560;
        color: white;
        border: none;
        padding: 14px 28px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.1s;
        width: 100%;
        letter-spacing: 1px;
    }
    button:hover {
        background-color: #d1304b;
    }
    button:active {
        transform: scale(0.98);
    }
    button:disabled {
        background-color: #555;
        cursor: not-allowed;
        transform: none;
    }
    .result-box {
        margin-top: 30px;
        min-height: 120px;
        background-color: #1a1a2e;
        border: 2px dashed #e94560;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        padding: 20px;
        line-height: 1.6;
    }
    /* 動畫過程中的文字設定為半透明，營造跳動感 */
    .animating-text {
        opacity: 0.5;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🐺 抽百變狼王</h1>
    
    <div class="controls">
        <label>
            <input type="radio" name="version" id="version1" checked>
            百變狼王1.0
        </label>
        <label>
            <input type="radio" name="version" id="version2">
            百變狼王2.0
        </label>
    </div>
    
    <button id="drawBtn" onclick="startDraw()">開始抽取</button>

    <div class="result-box" id="resultDisplay">
        <span style="color: #666;">到底誰會變狼王呢</span>
    </div>
</div>

<script>
    // 更新各神牌的專屬顏色
    const roleColors = {
        "預言家": "#8e44ad", // 深紫色
        "女巫": "#ff5252",   // 紅色
        "獵人": "#f1c40f",   // 原本的黃色
        "攝夢人": "#7b68ee", // 藍紫色
        "熊": "#cd853f",     // 咖啡色
        "魔術師": "#1976d2"  // 深藍色
    };

    function startDraw() {
        const isVersion2 = document.getElementById('version2').checked;
        const basePool = ["預言家", "女巫", "獵人", "攝夢人", "熊"];
        const pool2 = [...basePool, "魔術師"];
        const displayElement = document.getElementById('resultDisplay');
        const drawBtn = document.getElementById('drawBtn');
        
        drawBtn.disabled = true;
        
        let frames = 0;
        const maxFrames = 20; 
        const speed = 60; 
        
        const intervalId = setInterval(() => {
            if (isVersion2) {
                const rand1 = pool2[Math.floor(Math.random() * pool2.length)];
                const rand2 = pool2[Math.floor(Math.random() * pool2.length)];
                
                displayElement.innerHTML = `
                    <div style="color: #e0e0e0; font-size: 18px;">百變狼王</div>
                    <div class="animating-text" style="font-size: 28px; margin-bottom: 10px; color: ${roleColors[rand1]};">${rand1}</div>
                    <div style="color: #e0e0e0; font-size: 18px;">假面狼王</div>
                    <div class="animating-text" style="font-size: 28px; color: ${roleColors[rand2]};">${rand2}</div>
                `;
            } else {
                const rand = basePool[Math.floor(Math.random() * basePool.length)];
                
                displayElement.innerHTML = `
                    <div style="color: #e0e0e0; font-size: 18px;">百變狼王</div>
                    <div class="animating-text" style="font-size: 32px; margin-top: 10px; color: ${roleColors[rand]};">${rand}</div>
                `;
            }
            
            frames++;
            
            if (frames >= maxFrames) {
                clearInterval(intervalId);
                showFinalResult(isVersion2, basePool, pool2, displayElement);
                drawBtn.disabled = false; 
            }
        }, speed);
    }

    function showFinalResult(isVersion2, basePool, pool2, displayElement) {
        if (isVersion2) {
            let pool = [...pool2];
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            
            displayElement.innerHTML = `
                <div style="color: #e0e0e0; font-size: 18px;">百變狼王</div>
                <div style="font-size: 28px; margin-bottom: 10px; color: ${roleColors[pool[0]]};">${pool[0]}</div>
                <div style="color: #e0e0e0; font-size: 18px;">假面狼王</div>
                <div style="font-size: 28px; color: ${roleColors[pool[1]]};">${pool[1]}</div>
            `;
        } else {
            let index = Math.floor(Math.random() * basePool.length);
            
            displayElement.innerHTML = `
                <div style="color: #e0e0e0; font-size: 18px;">百變狼王</div>
                <div style="font-size: 32px; margin-top: 10px; color: ${roleColors[basePool[index]]};">${basePool[index]}</div>
            `;
        }
    }
</script>

</body>
</html>
