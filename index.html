<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百變狼王抽籤系統</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e;
        color: #eaeaea;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px 0;
    }
    .container {
        background-color: #16213e;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        text-align: center;
        max-width: 450px;
        width: 90%;
        border: 1px solid #0f3460;
    }
    h1 {
        font-size: 26px;
        margin-bottom: 25px;
        color: #f1c40f; 
        letter-spacing: 2px;
    }
    .controls {
        margin: 0 auto 25px auto; 
        width: 220px; 
        background-color: #0f3460;
        padding: 15px 20px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    label {
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: #fff;
        transition: color 0.2s;
    }
    label:hover {
        color: #f1c40f;
    }
    input[type="radio"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #e94560;
    }
    button {
        background-color: #e94560;
        color: white;
        border: none;
        padding: 14px 28px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.1s;
        
        display: block; 
        margin: 0 auto; 
        width: 220px; 
        
        letter-spacing: 1px;
    }
    button:hover {
        background-color: #d1304b;
    }
    button:active {
        transform: scale(0.98);
    }
    button:disabled {
        background-color: #555;
        cursor: not-allowed;
        transform: none;
    }
    .result-box {
        margin-top: 30px;
        min-height: 120px;
        background-color: #1a1a2e;
        border: 2px dashed #e94560;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        padding: 20px;
        line-height: 1.6;
    }
    
    /* 針對卡牌圖片的樣式設定 */
    .role-card {
        width: 140px;          
        height: 190px;         
        object-fit: cover;     
        border-radius: 10px;   
        box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        margin: 15px 0;
        border: 3px solid transparent; 
        transition: all 0.2s;
    }
    
    /* 最終結果顯示黑色邊框 */
    .final-card {
        border-color: #000000;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.8); 
    }
    
    /* 動畫過程中的圖片設定為半透明，營造洗牌跳動感 */
    .animating-card {
        opacity: 0.5;
        filter: grayscale(30%);
    }

    .role-name {
        font-size: 16px;
        color: #e0e0e0;
        margin-bottom: 5px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🐺 抽百變狼王</h1>
    
    <div class="controls">
        <label>
            <input type="radio" name="version" id="version1" checked>
            百變狼王1.0
        </label>
        <label>
            <input type="radio" name="version" id="version2">
            百變狼王2.0
        </label>
    </div>
    
    <button id="drawBtn" onclick="startDraw()">開始抽取</button>

    <div class="result-box" id="resultDisplay">
        <span style="color: #666;">到底誰會變狼王呢</span>
    </div>
</div>

<script>
    // 建立神牌與圖片網址的對應表
    const roleImages = {
        "預言家": "https://i.postimg.cc/D0B9BXHx/guang-ming-yu-yan-jia.webp",
        "女巫": "https://i.postimg.cc/CxGxsvmY/guang-ming-nu-wu.webp",
        "獵人": "https://i.postimg.cc/SKVQwJBT/lie-ren.jpg",
        "攝夢人": "https://i.postimg.cc/DwrwPCBZ/she-meng-ren.webp",
        "熊": "https://i.postimg.cc/pLfLJ0ks/xun-xiong-shi.webp",
        "魔術師": "https://i.postimg.cc/mD5LgK2c/mo-shu-shi.png"
    };

    function startDraw() {
        const isVersion2 = document.getElementById('version2').checked;
        const basePool = ["預言家", "女巫", "獵人", "攝夢人", "熊"];
        const pool2 = [...basePool, "魔術師"];
        const displayElement = document.getElementById('resultDisplay');
        const drawBtn = document.getElementById('drawBtn');
        
        drawBtn.disabled = true;
        
        let frames = 0;
        const maxFrames = 20; 
        const speed = 60; 
        
        const intervalId = setInterval(() => {
            if (isVersion2) {
                const rand1 = pool2[Math.floor(Math.random() * pool2.length)];
                const rand2 = pool2[Math.floor(Math.random() * pool2.length)];
                
                displayElement.innerHTML = `
                    <div style="color: #ff0000; font-size: 18px;">百變狼王</div>
                    <img src="${roleImages[rand1]}" class="role-card animating-card" alt="${rand1}">
                    
                    <div style="color: #ff0000; font-size: 18px; margin-top: 10px;">假面狼王</div>
                    <img src="${roleImages[rand2]}" class="role-card animating-card" alt="${rand2}">
                `;
            } else {
                const rand = basePool[Math.floor(Math.random() * basePool.length)];
                
                displayElement.innerHTML = `
                    <div style="color: #ff0000; font-size: 18px;">百變狼王</div>
                    <img src="${roleImages[rand]}" class="role-card animating-card" alt="${rand}">
                `;
            }
            
            frames++;
            
            if (frames >= maxFrames) {
                clearInterval(intervalId);
                showFinalResult(isVersion2, basePool, pool2, displayElement);
                drawBtn.disabled = false; 
            }
        }, speed);
    }

    function showFinalResult(isVersion2, basePool, pool2, displayElement) {
        if (isVersion2) {
            let pool = [...pool2];
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            
            displayElement.innerHTML = `
                <div style="color: #ff0000; font-size: 20px;">百變狼王</div>
                <div class="role-name">${pool[0]}</div>
                <img src="${roleImages[pool[0]]}" class="role-card final-card" alt="${pool[0]}">
                
                <div style="color: #ff0000; font-size: 20px; margin-top: 15px;">假面狼王</div>
                <div class="role-name">${pool[1]}</div>
                <img src="${roleImages[pool[1]]}" class="role-card final-card" alt="${pool[1]}">
            `;
        } else {
            let index = Math.floor(Math.random() * basePool.length);
            let resultRole = basePool[index];
            
            displayElement.innerHTML = `
                <div style="color: #ff0000; font-size: 20px;">百變狼王</div>
                <div class="role-name">${resultRole}</div>
                <img src="${roleImages[resultRole]}" class="role-card final-card" alt="${resultRole}">
            `;
        }
    }
</script>

</body>
</html>
