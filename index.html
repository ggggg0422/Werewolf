<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百變狼王抽籤系統</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e;
        color: #eaeaea;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background-color: #16213e;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        text-align: center;
        max-width: 450px;
        width: 90%;
        border: 1px solid #0f3460;
    }
    h1 {
        font-size: 26px;
        margin-bottom: 25px;
        color: #e94560;
        letter-spacing: 2px;
    }
    .controls {
        margin-bottom: 25px;
        background-color: #0f3460;
        padding: 15px;
        border-radius: 8px;
    }
    label {
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: #fff;
    }
    input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
    }
    button {
        background-color: #e94560;
        color: white;
        border: none;
        padding: 14px 28px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.1s;
        width: 100%;
        letter-spacing: 1px;
    }
    button:hover {
        background-color: #d1304b;
    }
    button:active {
        transform: scale(0.98);
    }
    .result-box {
        margin-top: 30px;
        min-height: 100px;
        background-color: #1a1a2e;
        border: 2px dashed #e94560;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        padding: 20px;
        line-height: 1.6;
        color: #f1c40f;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🐺 抽百變狼王</h1>
    
    <div class="controls">
        <label>
            <input type="checkbox" id="magicianToggle">
            百變狼王2.0
        </label>
    </div>
    
    <button onclick="drawRoles()">開始抽取</button>

    <div class="result-box" id="resultDisplay">
        <span style="color: #666;">等待狼王抽籤...</span>
    </div>
</div>

<script>
    function drawRoles() {
        const includeMagician = document.getElementById('magicianToggle').checked;
        const basePool = ["預言家", "女巫", "獵人", "攝夢人", "熊"];
        const displayElement = document.getElementById('resultDisplay');
        
        displayElement.innerHTML = "<span style='color: #a9a9a9;'>狼王正在選擇技能中...</span>";

        setTimeout(() => {
            if (includeMagician) {
                let pool = [...basePool, "魔術師"];
                
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                
                const firstSkill = pool[0];
                const secondSkill = pool[1];
                
                displayElement.innerHTML = `
                    <div style="color: #e0e0e0; font-size: 18px;">百變狼王</div>
                    <div style="font-size: 28px; margin-bottom: 10px;">【${firstSkill}】</div>
                    <div style="color: #e0e0e0; font-size: 18px;">假面狼王</div>
                    <div style="font-size: 28px;">【${secondSkill}】</div>
                `;
            } else {
                let index = Math.floor(Math.random() * basePool.length);
                const skill = basePool[index];
                
                displayElement.innerHTML = `
                    <div style="color: #e0e0e0; font-size: 18px;">百變狼王</div>
                    <div style="font-size: 32px; margin-top: 10px;">【${skill}】</div>
                `;
            }
        }, 600);
    }
</script>

</body>
</html>
